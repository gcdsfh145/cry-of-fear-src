name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - dev
      - 'feature/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Apply Build Fix Patches
        run: |
          if [ -d ".github/patches" ]; then
            for patch in .github/patches/*.patch; do
              echo "Applying $patch..."
              git apply "$patch"
            done
          fi

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Build HLSDK Android APK (Release)
        shell: bash
        run: |
          cd src/cof/android
          chmod +x gradlew
          ./gradlew assembleRelease

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cry-of-fear-hlsdk-apk
          path: src/cof/android/app/build/outputs/apk/release/*.apk
