name: Build Android APK

on:
  push:
    branches:
      - main
      - master
      - dev
      - 'feature/**'
    tags:
      - 'v*'
  pull_request:
    branches:
      - main
      - master
  workflow_dispatch:

jobs:
  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4
        with:
          submodules: recursive
          fetch-depth: 0

      - name: Apply Build Fix Patches
        run: |
          if [ -d ".github/patches" ]; then
            for patch in .github/patches/*.patch; do
              echo "Applying $patch..."
              git apply "$patch"
            done
          fi

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: 'gradle'

      - name: Setup Android NDK
        id: setup-ndk
        uses: nttld/setup-ndk@v1
        with:
          ndk-version: '29.0.14206865'
          link-to-sdk: true

      - name: Build Android APK (Release & Debug)
        shell: pwsh
        run: |
          # Dynamically update the NDK version in gradle files
          find . -name "build.gradle" -exec sed -i 's/26\.1\.10909125/29.0.14206865/g' {} +
          ./build_android.sh -Configuration Release -Abi arm -NdkVersion "29.0.14206865" -AndroidNdkRoot "${{ steps.setup-ndk.outputs.ndk-path }}" -AndroidSdkRoot "$ANDROID_HOME"

      - name: Upload Android APK
        uses: actions/upload-artifact@v4
        with:
          name: cry-of-fear-android-apk
          path: out/android/xash3d-cof.apk
